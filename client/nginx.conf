# This Nginx config is ONLY for the frontend container.
# It serves static files and handles React Router's
# client-side routing.
#
# The key line is `try_files $uri $uri/ /index.html`
# Without it:
#   User visits /dashboard → Nginx looks for /dashboard file
#   → not found → 404
# With it:
#   User visits /dashboard → Nginx tries the file, then the
#   folder, then falls back to index.html → React Router takes
#   over and renders the right page.    

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets with long cache headers
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # All other routes → index.html (React Router handles it)
  location / {
    try_files $uri $uri/ /index.html;
  }
}