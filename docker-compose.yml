
# # ─────────────────────────────────────────────────────────────
# # NETWORKS
# # All containers share one internal bridge network.
# # They talk to each other by container name (e.g. "postgres",
# # "redis", "kafka"). Nothing is exposed to the internet
# # except Nginx on ports 80/443.
# # ─────────────────────────────────────────────────────────────
# networks:
#   app-network:
#     driver: bridge

# # ─────────────────────────────────────────────────────────────
# # VOLUMES
# # Named volumes persist data even if containers are stopped
# # or removed. Without this, your DB resets every restart.
# # ─────────────────────────────────────────────────────────────
# volumes:
#   postgres-data:
#   redis-data:
#   kafka-data:
# services:

#   # ─────────────────────────────────────────────
#   # POSTGRES
#   # Primary database. Prisma handles all table
#   # creation via migrations — no init.sql needed.
#   # Data is stored in the postgres-data volume so
#   # it survives container restarts.
#   # ─────────────────────────────────────────────
#   postgres:
#     image: postgres:15-alpine
#     container_name: postgres
#     environment:
#       POSTGRES_USER: ${POSTGRES_USER:-urluser}
#       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urlpass}
#       POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
#     volumes:
#       - postgres-data:/var/lib/postgresql/data
#     networks:
#       - app-network
#     healthcheck:
#       test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urluser}"]
#       interval: 10s
#       timeout: 5s
#       retries: 5

#   # ─────────────────────────────────────────────
#   # REDIS
#   # In-memory cache. Stores shortCode → originalUrl
#   # so redirects don't hit Postgres every time.
#   # Speed: ~1ms vs ~10ms for a DB query.
#   # ─────────────────────────────────────────────
#   redis:
#     image: redis:7-alpine
#     container_name: redis
#     volumes:
#       - redis-data:/data
#     networks:
#       - app-network
#     healthcheck:
#       test: ["CMD", "redis-cli", "ping"]
#       interval: 10s
#       timeout: 5s
#       retries: 5

#   # ─────────────────────────────────────────────
#   # KAFKA (KRaft mode — no Zookeeper)
#   #
#   # KRaft = Kafka Raft. Since Kafka 2.8+, Kafka
#   # manages its own metadata internally. No need
#   # for a separate Zookeeper container anymore.
#   #
#   # Key env vars explained:
#   #
#   # KAFKA_NODE_ID: unique ID for this broker (1)
#   #
#   # KAFKA_PROCESS_ROLES: "broker,controller" means
#   # this single node acts as BOTH the message broker
#   # AND the cluster controller (fine for dev).
#   #
#   # KAFKA_LISTENERS:
#   #   PLAINTEXT://0.0.0.0:9092  → internal (container to container)
#   #   CONTROLLER://0.0.0.0:9093 → KRaft internal controller traffic
#   #   EXTERNAL://0.0.0.0:29092  → exposed to your host machine (debugging)
#   #
#   # KAFKA_ADVERTISED_LISTENERS: what address Kafka
#   # tells clients to connect to. Containers use
#   # kafka:9092. Your laptop uses localhost:29092.
#   #
#   # CLUSTER_ID: required for KRaft. A fixed base64
#   # UUID that identifies this cluster.
#   # ─────────────────────────────────────────────
#   kafka:
#     image: confluentinc/cp-kafka:7.5.0
#     container_name: kafka
#     ports:
#       - "29092:29092"
#     environment:
#       KAFKA_NODE_ID: 1
#       KAFKA_PROCESS_ROLES: broker,controller
#       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
#       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
#       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
#       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
#       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
#       KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
#       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
#       KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
#       KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
#       KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
#       KAFKA_LOG_DIRS: /var/lib/kafka/data
#       CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
#     volumes:
#       - kafka-data:/var/lib/kafka/data
#     networks:
#       - app-network
#     healthcheck:
#       test: kafka-broker-api-versions --bootstrap-server localhost:9092
#       interval: 15s
#       timeout: 10s
#       retries: 10

#   # ─────────────────────────────────────────────
#   # API
#   # Main Express app. Handles all HTTP traffic.
#   #
#   # depends_on with condition: service_healthy
#   # means Docker waits for postgres, redis, kafka
#   # healthchecks to pass before starting the API.
#   # Without this, the API might start before the
#   # DB is ready and crash on the first query.
#   #
#   # The command does two things in sequence:
#   #   1. npx prisma migrate deploy → creates/updates
#   #      tables in Postgres from your schema.prisma
#   #   2. node dist/app.js → starts the server
#   # ─────────────────────────────────────────────
#   api:
#     build:
#       context: ./api
#       dockerfile: Dockerfile
#     container_name: api
#     depends_on:
#       postgres:
#         condition: service_healthy
#       redis:
#         condition: service_healthy
#       kafka:
#         condition: service_healthy
#     environment:
#       NODE_ENV: development
#       PORT: 3000
#       DATABASE_URL: postgresql://${POSTGRES_USER:-urluser}:${POSTGRES_PASSWORD:-urlpass}@postgres:5432/${POSTGRES_DB:-urlshortener}
#       REDIS_URL: redis://redis:6379
#       KAFKA_BROKER: kafka:9092
#       JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
#       BASE_URL: ${BASE_URL:-http://localhost}
#     command: sh -c "npx prisma migrate deploy && node dist/index.js"
#     networks:
#       - app-network

#   # ─────────────────────────────────────────────
#   # CONSUMER
#   # A completely separate Node.js process.
#   # Its only job: read click events from Kafka
#   # and write them to the url_clicks table.
#   #
#   # Why separate from the API?
#   # If analytics writing is slow or crashes, the
#   # API (and redirects) keep working perfectly.
#   # Kafka holds the events until the consumer
#   # recovers. This is the whole point of Kafka.
#   # ─────────────────────────────────────────────
#   consumer:
#     build:
#       context: ./consumer
#       dockerfile: Dockerfile
#     container_name: consumer
#     depends_on:
#       postgres:
#         condition: service_healthy
#       kafka:
#         condition: service_healthy
#     environment:
#       DATABASE_URL: postgresql://${POSTGRES_USER:-urluser}:${POSTGRES_PASSWORD:-urlpass}@postgres:5432/${POSTGRES_DB:-urlshortener}
#       KAFKA_BROKER: kafka:9092
#       KAFKA_GROUP_ID: analytics-consumer-group
#     networks:
#       - app-network

#   # ─────────────────────────────────────────────
#   # NGINX
#   # The only container the outside world sees.
#   # Listens on port 80, routes traffic internally.
#   # /r/*   → api:3000  (redirects)
#   # /api/* → api:3000  (REST endpoints)
#   # /      → frontend (Phase 8)
#   # ─────────────────────────────────────────────
#   nginx:
#     image: nginx:alpine
#     container_name: nginx
#     ports:
#       - "80:80"
#     volumes:
#       - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
#     depends_on:
#       - api
#     networks:
#       - app-network

# ─────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urlpass}
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urluser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-urluser}:${POSTGRES_PASSWORD:-urlpass}@postgres:5432/${POSTGRES_DB:-urlshortener}"
      REDIS_URL: "redis://redis:6379"
      KAFKA_BROKER: "kafka:9092"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      BASE_URL: "${BASE_URL:-http://localhost}"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    networks:
      - app-network

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-urluser}:${POSTGRES_PASSWORD:-urlpass}@postgres:5432/${POSTGRES_DB:-urlshortener}"
      KAFKA_BROKER: "kafka:9092"
      KAFKA_GROUP_ID: "analytics-consumer-group"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app-network