events {
  worker_connections 1024;
}

http {

  # ─────────────────────────────────────────────
  # RATE LIMITING
  # Protects the redirect endpoint from bots/abuse.
  # limit_req_zone defines a shared memory zone:
  #   $binary_remote_addr = key (one slot per IP)
  #   zone=redirects:10m  = 10MB of memory (~160k IPs)
  #   rate=30r/m          = max 30 requests/minute per IP
  # ─────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=redirects:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  server {
    listen 80;
    server_name _;

    # ───────────────────────────────────────────
    # REAL IP FORWARDING
    # Without these headers, Node.js sees Nginx's
    # internal IP (172.x.x.x) instead of the real
    # user IP. Your geo analytics would all show
    # the same IP. These headers pass the real IP.
    # ───────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ───────────────────────────────────────────
    # REDIRECT ENDPOINT — the hot path
    # Every short URL click hits this route.
    # Rate limited to prevent bot abuse.
    # burst=10: allows a spike of 10 extra requests
    # nodelay: don't queue, reject immediately
    # ───────────────────────────────────────────
    location /r/ {
      limit_req zone=redirects burst=10 nodelay;
      proxy_pass http://api:3000;
    }

    # ───────────────────────────────────────────
    # API ENDPOINTS
    # All /api/* routes go to the Node.js service.
    # ───────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api:3000;
    }

    # ───────────────────────────────────────────
    # HEALTH CHECK — no rate limit needed
    # ───────────────────────────────────────────
    location /health {
      proxy_pass http://api:3000;
    }

    # ───────────────────────────────────────────
    # FRONTEND — Phase 8 (placeholder for now)
    # Returns 503 until frontend container exists.
    # ───────────────────────────────────────────
    location / {
      return 503 "Frontend not yet configured";
    }
  }
}